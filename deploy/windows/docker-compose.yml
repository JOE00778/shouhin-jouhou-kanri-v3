# ============================================================
# 一元管理系统 V2.3 · Windows 笔记本部署（影刀共存版）
# Postgres 16 + Streamlit + Cloudflared
# ============================================================
# 配置依据：Dell Inspiron 5405 / Ryzen 5 4500U (6C6T) / 16GB RAM
# 资源严格受限，保证影刀（YingDao）RPA 不受影响：
#   - Postgres: 1 GB RAM / 0.5 CPU
#   - Streamlit: 2 GB RAM / 1.5 CPU
#   - Cloudflared: 256 MB RAM / 0.25 CPU
#   - pgweb (DB 可视化): 256 MB RAM / 0.25 CPU
#   合计：约 3.8 GB RAM + 2.5 CPU 核（剩余 ~12 GB / 3.5 核给影刀 + Windows）
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: cms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cms}
      POSTGRES_USER: ${POSTGRES_USER:-cms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Tokyo
    volumes:
      # Windows: D:\cms-v230\data\postgres → 容器内
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
      - ./schema.postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - cms_net
      - smikie_shared    # ← 跨 stack 网络：让 N8N stack 的 cms-api 容器能连进来
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cms} -d ${POSTGRES_DB:-cms}"]
      interval: 30s
      timeout: 5s
      retries: 5

  streamlit:
    build:
      context: ../..
      dockerfile: deploy/windows/Dockerfile
    container_name: cms_streamlit
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cms}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cms}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-JO043}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GUEST_USERNAME: ${GUEST_USERNAME:-smikiejapan}
      GUEST_PASSWORD: ${GUEST_PASSWORD}
      PAGE99_PASSWORD: ${PAGE99_PASSWORD:-}
      LARK_APP_ID: ${LARK_APP_ID:-}
      LARK_APP_SECRET: ${LARK_APP_SECRET:-}
      LARK_REDIRECT_URI: ${LARK_REDIRECT_URI:-}
      ADMIN_LARK_EMAILS: ${ADMIN_LARK_EMAILS:-}
      TZ: Asia/Tokyo
    volumes:
      - ${DATA_DIR:-./data}/inputs:/app/data/inputs
      - ${DATA_DIR:-./data}/outputs:/app/data/outputs
    networks:
      - cms_net
    expose:
      - "8501"
    ports:
      - "127.0.0.1:8501:8501"   # 本地浏览器访问 http://localhost:8501（仅本机；公网走 cloudflared）
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 1024M

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cms_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - streamlit
    networks:
      - cms_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ------------------------------------------------------------
  # pgweb · DB 可视化（浏览器看所有表 / 跑 SQL / 导出 CSV·JSON）
  #   笔记本本机访问 http://localhost:8081（绑 127.0.0.1，不走公网）
  #   远程查看请用远程桌面登进笔记本再开；不要映射到 0.0.0.0、也别挂到 cloudflared
  # ------------------------------------------------------------
  pgweb:
    image: sosedoff/pgweb:latest
    container_name: cms_pgweb
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # pgweb は DATABASE_URL を読んで自動接続する
      DATABASE_URL: postgresql://${POSTGRES_USER:-cms}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cms}?sslmode=disable
      # 任意: pgweb 自体に簡易 Basic 認証をかけたい場合は .env で下 2 つを設定（空なら認証なし）
      PGWEB_AUTH_USER: ${PGWEB_AUTH_USER:-}
      PGWEB_AUTH_PASS: ${PGWEB_AUTH_PASS:-}
      TZ: Asia/Tokyo
    networks:
      - cms_net
    ports:
      - "127.0.0.1:8081:8081"   # 仅本机；公网一律不开
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

networks:
  cms_net:
    driver: bridge
  # ============================================================
  # 跨 stack 共享网络（与 deploy/n8n/docker-compose.yml 同名 external）
  # 部署前需先手动建一次:  docker network create smikie_shared
  # 然后两边 stack 都 docker compose up -d --force-recreate
  # 仅 postgres 服务加入此网络（让 N8N stack 的 cms-api 能直连）
  # ============================================================
  smikie_shared:
    external: true
    name: smikie_shared
