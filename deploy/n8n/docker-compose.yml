# ============================================================
# Smikie N8N · Windows 笔记本独立部署（与 CMS 同机共存）
# 三个服务： n8n + cloudflared + stock-monitor（改廃监控）
# 公网入口： https://n8n.smikie-cms.cc
# ============================================================
# 资源严格限制，影刀 + CMS + N8N 三方共存：
#   - n8n:           1 GB RAM / 0.75 CPU
#   - cloudflared:   256 MB RAM / 0.25 CPU
#   - stock-monitor: 512 MB RAM / 0.5 CPU（月度跑一次，平时几乎不占）
#   合计：约 1.75 GB RAM + 1.5 CPU 核
#
# 数据库：n8n 自带 SQLite（足够用，~MB 量级），不引入 Postgres 依赖。
# 数据持久化：./data/n8n → 容器内 /home/node/.n8n
# ============================================================

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: smikie_n8n
    restart: unless-stopped
    environment:
      # 公网域名 + HTTPS 回调（cloudflared 终结 TLS，n8n 内部仍 HTTP）
      N8N_HOST: ${N8N_HOST:-n8n.smikie-cms.cc}
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      WEBHOOK_URL: https://${N8N_HOST:-n8n.smikie-cms.cc}/
      # 第一层守门：n8n 自带 BasicAuth
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      # 加密 keychain（修改后所有凭证失效，部署后不要动）
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      # 时区
      GENERIC_TIMEZONE: Asia/Tokyo
      TZ: Asia/Tokyo
      # 凭证密钥不写日志
      N8N_LOG_LEVEL: info
      # 允许 workflow node 通过 $env.XXX 读取容器环境变量 (默认 true 禁止)
      # 必须 false 才能让「环境变量提取」节点拿到 LARK_WEBHOOK_URL / LARK_BOT_SIGN_SECRET 等
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # 允许 Code node 里 require() 内置模块 (crypto 用于飞书签名 HMAC-SHA256)
      NODE_FUNCTION_ALLOW_BUILTIN: "crypto"
      # 如需 require('axios') 等外部包，列在这里 (当前未用)
      # NODE_FUNCTION_ALLOW_EXTERNAL: "axios,lodash"
      # CMS 回调地址（用于 N8N workflow 内部回写状态）
      CMS_CALLBACK_URL: ${CMS_CALLBACK_URL:-https://smikie-cms.cc/api/automation/callback}
      # Lark webhook（飞书群机器人，所有 workflow 共用）
      LARK_WEBHOOK_URL: ${LARK_WEBHOOK_URL:-}
      # 飞书机器人签名校验 Secret（启用「签名校验」时填，留空=用关键词校验）
      LARK_BOT_SIGN_SECRET: ${LARK_BOT_SIGN_SECRET:-}
      # Shopee Open API 凭证（v2.2 workflow B3.5 category_recommend + B5c 真上架）
      SHOPEE_PARTNER_ID: ${SHOPEE_PARTNER_ID:-}
      SHOPEE_PARTNER_KEY: ${SHOPEE_PARTNER_KEY:-}
      # v2.10: Shopee Open Platform v2 host（Test sandbox 用 openplatform.sandbox.test-stable.shopee.sg；
      # 老域名 partner.shopeemobile.com 是 v1 入口，v2 partner_id 不识别会报 Wrong sign）
      SHOPEE_API_BASE: ${SHOPEE_API_BASE:-https://openplatform.shopee.sg}
      SHOPEE_SHOP_IDS: ${SHOPEE_SHOP_IDS:-{}}
      SHOPEE_ACCESS_TOKENS: ${SHOPEE_ACCESS_TOKENS:-{}}
      SHOPEE_REFRESH_TOKENS: ${SHOPEE_REFRESH_TOKENS:-{}}
      # 国产 LLM / 图像模型 API（本地化合规：国内云、承诺不训练用户数据）
      # DeepSeek（备用，主力走火山方舟 DeepSeek-V3.2 endpoint）
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # 火山方舟（文本: DeepSeek-V3.2 / 豆包；图像: Seedream / 豆包 Vision）
      VOLC_ARK_API_KEY: ${VOLC_ARK_API_KEY:-}
      # 火山方舟「文本」模型 endpoint ID（shopee v2.0 workflow 用）
      VOLC_ARK_TEXT_MODEL: ${VOLC_ARK_TEXT_MODEL:-deepseek-v3-2-251201}
      # CMS 基础 URL（v2.0 workflow 拼 /api/sku/master + /api/automation/xlsx-upload）
      CMS_BASE_URL: ${CMS_BASE_URL:-https://smikie-cms.cc}
      # 备用国产 LLM（灰度切换可选）
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      # N8N UI 语言（zh-CN / ja / en；翻译覆盖率 60-80%）
      N8N_DEFAULT_LOCALE: ${N8N_DEFAULT_LOCALE:-en}
      # 暴露给 workflow 用的工作目录（Boss 可挂载 SmikieJapan 共享文件夹）
      N8N_USER_FOLDER: /data
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./data/files:/data
      - ./workflows:/workflows:ro   # 预装 workflow（首次启动后由脚本导入）
    networks:
      - smikie_n8n_net
      - smikie_shared    # T-318: 让 cms_streamlit 跨 stack 调 webhook
    expose:
      - "5678"
    ports:
      - "127.0.0.1:5678:5678"   # 本地浏览器 http://localhost:5678（仅本机；公网走 cloudflared）
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: smikie_n8n_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - n8n
    networks:
      - smikie_n8n_net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ============================================================
  # 改廃监控（stock-monitor）· N8N 月度 cron 调用其 /run 端点
  # N8N workflow: stock-monitor-monthly.json → HTTP GET stock-monitor:8787/run
  # ============================================================
  stock-monitor:
    build:
      context: ./stock_monitor
      dockerfile: Dockerfile
    container_name: smikie_stock_monitor
    restart: unless-stopped
    environment:
      PORT: "8787"
      STOCK_MONITOR_CSV: /data/item_master_bilingual.csv
      LARK_APP_ID: ${LARK_APP_ID:-}
      LARK_APP_SECRET: ${LARK_APP_SECRET:-}
      TZ: Asia/Tokyo
    volumes:
      # 项目运行时状态 + 报告 + cookies
      - ./stock_monitor/state:/app/state
      - ./stock_monitor/reports:/app/reports
      - ./stock_monitor/logs:/app/logs
      - ./stock_monitor/cookies:/app/cookies
      # JAN 列表 CSV（Boss 从 CMS 导出后放到 ./data/files/）
      - ./data/files/item_master_bilingual.csv:/data/item_master_bilingual.csv:ro
    networks:
      - smikie_n8n_net
    expose:
      - "8787"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ============================================================
  # CMS API sidecar · 补 v2.0 workflow 需要的 3 个 endpoint
  # N8N workflow 走容器名 http://cms-api:8789/，不绕 cloudflared 公网
  # warehouse.db 以 ro 挂入，xlsx-upload 落 outputs/（read-write）
  # ============================================================
  cms-api:
    build:
      context: ./cms_api
      dockerfile: Dockerfile
    container_name: smikie_cms_api
    restart: unless-stopped
    environment:
      PORT: "8789"
      # Inspiron 生产用 Postgres：连 CMS V2.3 stack 的 cms_postgres 容器
      # 通过 external network smikie_shared 跨 stack 访问（用 container_name）
      DATABASE_URL: ${CMS_DATABASE_URL:-postgresql://cms:${POSTGRES_PASSWORD:-}@cms_postgres:5432/cms}
      # SQLite 兜底路径（仅在 DATABASE_URL 留空时用，Mac 本地开发场景）
      CMS_DB_PATH: /data/warehouse.db
      CMS_OUTPUTS_DIR: /data/outputs
      CMS_PUBLIC_BASE: ${CMS_BASE_URL:-https://smikie-cms.cc}
      # v2.4: cms-api OAuth helper 需要 partner 凭证生成授权链接 + 换 refresh_token
      # v2.10: 默认 host 改为 v2 入口 openplatform.shopee.sg（Test 沙箱 .env 覆盖为 sandbox host）
      SHOPEE_API_BASE: ${SHOPEE_API_BASE:-https://openplatform.shopee.sg}
      SHOPEE_PARTNER_ID: ${SHOPEE_PARTNER_ID:-}
      SHOPEE_PARTNER_KEY: ${SHOPEE_PARTNER_KEY:-}
      TZ: Asia/Tokyo
    volumes:
      # XLSX dry-run 产出（rw）；Boss 可在资源管理器看
      - ${CMS_OUTPUTS_HOST_PATH:-D:/Smikie-Images/automation_outputs}:/data/outputs
    networks:
      - smikie_n8n_net
      - smikie_shared    # ← 跨 stack 网络，跟 cms_postgres / cms_streamlit 通讯
    expose:
      - "8789"
    ports:
      - "127.0.0.1:8789:8789"   # 本机 PowerShell 测试 + OAuth helper 流程用（不暴露公网）
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8789/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # 商品图处理（image-processor）· N8N HTTP 调用 :8788/{upscale,cutout,compose-spu}
  # N8N workflow shopee-mass-upload v1.8+ 用其生成 Shopee 主图 / SPU 多图
  # 输入图: 远程 URL（CMS / NAS）或 base64
  # 落盘: Win D 盘 ${WHITEBG_HOST_PATH} → 容器内 /data/whitebg
  # ============================================================
  image-processor:
    build:
      context: ./image_processor
      dockerfile: Dockerfile
    container_name: smikie_image_processor
    restart: unless-stopped
    environment:
      PORT: "8788"
      WHITEBG_ROOT: /data/whitebg
      TEMPLATE_PATH: /app/assets/template_red.png
      TZ: Asia/Tokyo
    volumes:
      # Windows D 盘单独文件夹，N8N 跑完成品 Boss 可直接资源管理器看图
      # 默认 D:/Smikie-Images；首跑会自动建 raw/upscaled/branded/spu 4 子目录
      - ${WHITEBG_HOST_PATH:-D:/Smikie-Images}:/data/whitebg
    networks:
      - smikie_n8n_net
    expose:
      - "8788"
    ports:
      - "127.0.0.1:8788:8788"   # 本机 PowerShell 测试用（不暴露公网）
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M
        reservations:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8788/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  smikie_n8n_net:
    driver: bridge
  # ============================================================
  # 跨 stack 共享网络（与 CMS V2.3 deploy/windows/docker-compose.yml 同名）
  # 部署前需先手动建一次:   docker network create smikie_shared
  # 然后两边 stack 都 docker compose up -d --force-recreate
  # ============================================================
  smikie_shared:
    external: true
    name: smikie_shared
