# T-304 Shopee 类目映射规则
# 5 类目 ID:
#   100629 食品/饮料
#   100630 化妆/个护（默认 fallback）
#   100632 母婴/营养/药品
#   100638 文具/办公
#   100640 综合/电器/收纳
#
# 匹配优先级（高→低）：
#   1. brand_overrides   — 高确信度品牌强制映射（如 Pigeon → 母婴）
#   2. keywords          — 关键词匹配（按下面 priority_order 顺序）
#   3. category_hint_map — SPU.category_hint slash-prefix 兜底
#   4. fallback          — 默认 100630
#
# 关键词为大小写不敏感子串匹配，扫描 SPU 的：
#   - spu_key
#   - category_hint
#   - 每个 variant.notes
#   - listing.title / listing.description / listing.brand_normalized
#
# 越是「窄品类」（婴儿/食品/文具/电器收纳）越早匹配，cosmetics 兜底最后。

# ----- 优先级顺序 -----
priority_order:
  - "100632"   # 母婴/营养/药品（先于食品，避免 baby food 被判去食品）
  - "100629"   # 食品/饮料
  - "100638"   # 文具/办公
  - "100640"   # 综合/电器/收纳
  - "100630"   # 化妆/个护（默认 fallback）

fallback: "100630"

# ----- 品牌级别强制映射（覆盖关键词）-----
# 经验：这些品牌单一聚焦在一个类目上
brand_overrides:
  Pigeon: "100632"          # 婴儿
  Combi: "100632"           # 婴儿
  Wakodo: "100632"          # 婴儿食品（划归母婴而非食品）
  TOMICA: "100640"          # 玩具车（综合/收纳）
  Sonic: "100638"           # 文具
  PILOT: "100638"           # 文具
  Pilot: "100638"           # 文具
  ZEBRA: "100638"           # 文具
  PENTEL: "100638"          # 文具
  Pentel: "100638"
  TOMBOW: "100638"          # 文具
  LIHIT: "100638"           # 文具/办公（LIHIT LAB）
  Thermos: "100640"         # 保温瓶 → 收纳/电器
  Skater: "100640"          # 餐具水壶 → 收纳
  SKATER: "100640"
  SOTO: "100640"            # 户外用品/燃气 → 综合
  PELICAN: "100630"         # ペリカン石鹸 → 个护

# ----- 关键词规则 -----
# 每个类目下列举（小写）关键词；首个命中的类目（按 priority_order）即返回。
